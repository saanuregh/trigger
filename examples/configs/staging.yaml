# yaml-language-server: $schema=http://localhost:3000/api/config/schema

namespace: staging
display_name: Staging
aws_region: ap-south-1

vars:
  cluster: acme-staging
  subnets: [subnet-abc123, subnet-def456]
  security_groups: [sg-web-001]
  slack_webhook: https://hooks.slack.com/services/T00/B00/xxx

pipelines:
  # ── Deploy to staging ───────────────────────────────────
  - id: deploy
    name: Deploy to Staging
    description: Build from any branch, run migrations, and restart staging services.
    concurrency: 3
    params:
      - name: branch
        label: Branch
        type: string
        required: true
        placeholder: feature/my-branch
      - name: skip_migration
        label: Skip DB migration
        type: boolean
        default: false
    steps:
      - id: build
        name: Build
        action: codebuild
        config:
          project_name: acme-api-build-staging
          source_version: "{{param.branch}}"
          env_vars:
            DEPLOY_ENV: "{{param.branch}}"
            DB_PASSWORD: "{{env.STAGING_DB_PASSWORD}}"
      - id: migrate
        name: "Run migration: bun run db:migrate"
        action: ecs-task
        config:
          cluster: "{{vars.cluster}}"
          task_definition: acme-api-migrate-staging
          container_name: migrate
          command: [bun, run, "db:migrate"]
          subnets: "{{vars.subnets}}"
          security_groups: "{{vars.security_groups}}"
          timeout: 300
      - id: restart
        name: Restart Services
        action: ecs-restart
        config:
          cluster: "{{vars.cluster}}"
          services: [api-service, worker-service]
          timeout: 600
      - id: notify
        name: Slack Notification
        action: slack-notify
        config:
          webhook_url: "{{vars.slack_webhook}}"
          message: "Staging deploy complete ({{param.branch}})"

  # ── Run one-off task ────────────────────────────────────
  - id: run-task
    name: Run One-Off Task
    description: Run an arbitrary command on the staging cluster.
    concurrency: 1
    params:
      - name: task
        label: Task
        type: select
        options:
          - label: DB Seed
            value: "db:seed"
          - label: DB Reset
            value: "db:reset"
          - label: Cache Warm
            value: "cache:warm"
    steps:
      - id: run
        name: Run Task
        action: ecs-task
        config:
          cluster: "{{vars.cluster}}"
          task_definition: acme-api-task-staging
          container_name: api
          command: [bun, run, "{{param.task}}"]
          subnets: "{{vars.subnets}}"
          security_groups: "{{vars.security_groups}}"
          timeout: 300

  # ── Send Slack notification ────────────────────────────
  - id: slack-notify
    name: Send Slack Notification
    description: Send a custom message to the team Slack channel.
    concurrency: 3
    schedule:
      - cron: "*/5 * * * *"
        params:
          message: "Scheduled health check ping"
    params:
      - name: message
        label: Message
        type: string
        required: true
        placeholder: "Deployment complete, all systems go"
    steps:
      - id: notify
        name: Send Notification
        action: slack-notify
        config:
          webhook_url: "{{vars.slack_webhook}}"
          message: "{{param.message}}"

  # ── Promote staging to production ───────────────────────
  - id: promote
    name: Promote to Production
    description: Trigger the production deploy pipeline from staging.
    concurrency: 1
    confirm: true
    steps:
      - id: trigger-prod
        name: Trigger Production Deploy
        action: trigger-pipeline
        config:
          namespace: production
          pipeline_id: deploy-api
          params:
            branch: main

  # ── Scheduled cache purge ────────────────────────────────
  - id: cache-purge
    name: Scheduled Cache Purge
    description: Automatically purge Cloudflare cache on a schedule.
    schedule: "0 2 * * *"
    concurrency: 1
    steps:
      - id: purge
        name: Purge Cache
        action: cloudflare-purge
        config:
          purge_everything: true
